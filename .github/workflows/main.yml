name: Affiliate Auto Poster

on:
  schedule:
    # India Time: 08:30 PM (Daily Ek Baar)
    # US Time (EST): 11:00 AM (Morning/Lunch Peak)
    - cron: '00 15 * * *' 
  workflow_dispatch: # Manual run ke liye button

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Scraper Script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload Screenshots (For Debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-screenshots
          path: |
            *.png
            *.jpg

      - name: Commit Updated History File and Images
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add history.json
          git add images/  # <--- YAHAN NAYA LOGIC ADD KIYA HAI
          git commit -m "Update history and saved image" || echo "No changes to commit"
          git push
