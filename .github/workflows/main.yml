name: Affiliate Auto Poster

on:
  schedule:
    # India Time: 08:30 PM (Daily Ek Baar)
    # US Time (EST): 11:00 AM (Morning/Lunch Peak Shopping Time)
    - cron: '00 15 * * *' 
  workflow_dispatch: # Manual run ke liye button

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Run Scraper Script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload Screenshots (For Debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-screenshots
          path: |
            *.png
            *.jpg

      - name: Commit Updated History File and Images
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # History file add karein
          git add history.json || true
          
          # Smart Check: Agar images folder hai tabhi add karein taaki crash na ho
          if [ -d "images" ]; then
            git add images/
            echo "✅ Images folder found and added to commit."
          else
            echo "⚠️ Images folder not found, skipping."
          fi
          
          # Commit aur Push logic
          git commit -m "Update history and saved image [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
